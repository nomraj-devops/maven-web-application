version: 0.0  # EC2/on-premise deployments use version 0.0

os: linux     # The OS of your EC2 instance

files:
  - source: src/main/webapp/jsps    # Source directory from your GitHub repository
    destination: /var/www/myapp/jsps  # Destination directory on the EC2 instance

hooks:
  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
      runas: root
  
  AfterInstall:
    - location: scripts/pull_docker_image.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/start_container.sh
      timeout: 300
      runas: root

  ValidateService:
    - location: scripts/verify_service.sh
      timeout: 300
      runas: root
